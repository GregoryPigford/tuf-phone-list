<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUF Phone List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f2;
      --navy: #1a2744;
      --navy-light: #2a3d6b;
      --gold: #c9973a;
      --gold-light: #e8c07a;
      --text: #2d1f17;
      --text-muted: #7a5c50;
      --border: #ddd0c4;
    }

    body {
      background: #fff;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; flex-direction: column; }

    /* ── HOME ── */
    #home {
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      background: #fff;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 1.2rem;
      opacity: 0;
      transform: rotate(-200deg) scale(0.2);
      animation: spinIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards;
    }

    @keyframes spinIn {
      to { opacity: 1; transform: rotate(0deg) scale(1); }
    }

    .logo-wrap img {
      width: 260px;
      height: auto;
    }

    .home-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--navy);
      letter-spacing: 0.02em;
      margin-bottom: 0.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.1s forwards;
    }

    .home-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.25s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .home-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 300px;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.4s forwards;
    }

    .home-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 54px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: transform 0.12s, box-shadow 0.12s;
      letter-spacing: 0.02em;
    }
    .home-btn:active { transform: scale(0.97); }

    .btn-navy {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 4px 18px rgba(26,39,68,0.25);
    }
    .btn-navy:hover { background: var(--navy-light); }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #e0a840);
      color: var(--navy);
      box-shadow: 0 4px 18px rgba(201,151,58,0.3);
      font-weight: 600;
    }
    .btn-gold:hover { box-shadow: 0 6px 24px rgba(201,151,58,0.45); }

    .month-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #bbb;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.6s forwards;
    }

    /* ── INNER PAGES ── */
    .page-header {
      background: var(--navy);
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-logo {
      width: 40px;
      height: auto;
      cursor: pointer;
      flex-shrink: 0;
    }

    .header-logo:hover { opacity: 0.8; }

    .header-text { flex: 1; }
    .header-text h2 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.1rem;
      line-height: 1.2;
    }
    .header-text p { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 1px; }

    .back-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85);
      border-radius: 6px;
      padding: 6px 13px;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }

    .inner {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
      flex: 1;
    }

    /* ── FORM ── */
    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      box-shadow: 0 2px 14px rgba(26,39,68,0.06);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--navy);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.32rem;
    }
    label .req { color: var(--gold); margin-left: 2px; }

    input[type="text"], input[type="tel"], input[type="email"], input[type="date"], select {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 300;
      appearance: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,151,58,0.12);
    }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.8rem;
    }

    .sponsor-row { display: flex; gap: 8px; }
    .sponsor-row .select-wrap { flex: 1.2; }
    .sponsor-row input { flex: 1; }

    .hint { font-size: 0.74rem; color: var(--text-muted); margin-top: 0.28rem; }

    .gender-group { display: flex; flex-direction: column; gap: 7px; }

    .gender-opt {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }
    .gender-opt:hover { border-color: var(--gold-light); }
    .gender-opt.selected { border-color: var(--gold); background: #fef9f0; }
    .gender-opt input[type="radio"] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
    .gender-label { font-size: 0.9rem; color: var(--text); }

    .submit-btn {
      width: 100%;
      height: 46px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.18s;
      letter-spacing: 0.03em;
    }
    .submit-btn:hover { background: var(--navy-light); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .msg {
      margin-top: 0.75rem;
      padding: 10px 13px;
      border-radius: 7px;
      font-size: 0.87rem;
      display: none;
    }
    .msg.success { background: #edf6f0; border: 1px solid #a8d5b5; color: #3a6b4a; display: block; }
    .msg.error { background: #fdf0f0; border: 1px solid #dba8a8; color: #7a3a3a; display: block; }

    /* ── LIST ── */
    .sober-banner {
      background: var(--navy);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      margin-bottom: 1rem;
      color: #fff;
    }
    .sober-banner h3 {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--gold-light);
      margin-bottom: 0.55rem;
    }
    .sober-list { display: flex; flex-direction: column; gap: 5px; }
    .sober-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 0.83rem;
    }
    .sober-name { font-weight: 500; }
    .sober-years {
      background: var(--gold);
      color: var(--navy);
      border-radius: 10px;
      padding: 2px 9px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .no-sv { color: rgba(255,255,255,0.45); font-style: italic; font-size: 0.83rem; }

    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .stat {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      flex: 1;
    }
    .stat-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--navy); margin-top: 1px; }

    .gender-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      background: var(--warm-white);
    }

    .gtab {
      flex: 1;
      height: 40px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border-right: 1px solid var(--border);
    }
    .gtab:last-child { border-right: none; }
    .gtab:hover { background: #f5ede4; color: var(--navy); }
    .gtab.active { background: var(--navy); color: #fff; font-weight: 500; }

    .list-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      font-style: italic;
    }

    .table-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .print-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .print-btn:hover { border-color: var(--gold); color: var(--navy); }

    .table-wrap {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 11px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(26,39,68,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #edf0f7; }
    th {
      padding: 9px 13px;
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--navy-light);
      text-align: left;
    }
    td {
      padding: 11px 13px;
      font-size: 0.87rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fef9f2; }
    .name-cell { font-weight: 500; color: var(--navy); }
    .empty-cell { text-align: center; padding: 2.5rem; color: var(--text-muted); font-style: italic; }

    @media (max-width: 480px) {
      th:nth-child(4), td:nth-child(4) { display: none; }
    }

    @media print {
      .page-header, .gender-tabs, .print-btn, .month-note { display: none !important; }
      #home, #form-page { display: none !important; }
      #list-page { display: flex !important; }
      body { background: white; }
      .sober-banner { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>

    <div class="header-text">
      <h2>Add My Info</h2>
      <p>Join the phone list</p>
    </div>
    <button class="back-btn" onclick="goTo('home')">← Home</button>
  </div>
  <div class="inner">
    <div class="card">
      <p class="card-title">Your Information</p>

      <div class="field">
        <label>Identity <span class="req">*</span></label>
        <div class="gender-group">
          <label class="gender-opt" id="opt-male">
            <input type="radio" name="gender" value="male" />
            <span class="gender-label">Male</span>
          </label>
          <label class="gender-opt" id="opt-female">
            <input type="radio" name="gender" value="female" />
            <span class="gender-label">Female</span>
          </label>
          <label class="gender-opt" id="opt-nonbinary">
            <input type="radio" name="gender" value="nonbinary" />
            <span class="gender-label">Nonbinary / Other / Prefer not to say</span>
          </label>
        </div>
      </div>

      <div class="field">
        <label for="fname">Name <span class="req">*</span></label>
        <input type="text" id="fname" placeholder="e.g. Greg P." autocomplete="off" />
        <p class="hint">First name + last initial is common</p>
      </div>

      <div class="field">
        <label for="fphone">Phone Number <span class="req">*</span></label>
        <input type="tel" id="fphone" placeholder="(503) 555-1234" />
      </div>

      <div class="field">
        <label for="femail">Email Address</label>
        <input type="email" id="femail" placeholder="optional" />
      </div>

      <div class="field">
        <label for="fsobriety">Sobriety Date</label>
        <input type="date" id="fsobriety" />
      </div>

      <div class="field">
        <label>Willing to Sponsor?</label>
        <div class="sponsor-row">
          <div class="select-wrap">
            <select id="fsponsor_drop">
              <option value="">Select...</option>
              <option value="Yes">Yes</option>
              <option value="Ask me">Ask me</option>
              <option value="No">No</option>
              <option value="Not yet">Not yet</option>
              <option value="Sober support">Sober support only</option>
              <option value="Temporarily">Temporarily</option>
              <option value="Other">Other →</option>
            </select>
          </div>
          <input type="text" id="fsponsor_other" placeholder="notes..." />
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Add Me to the List</button>
      <div class="msg" id="fmsg"></div>
    </div>
  </div>

<script>
  // ── NAVIGATION ──
  function goTo(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    window.scrollTo(0, 0);
  }

  function goToList() {
    goTo('list-page');
    loadMembers();
  }

  // ── PHONE FORMAT ──
  function formatPhone(raw) {
    if (!raw) return '—';
    // Strip everything except digits and +
    const cleaned = raw.replace(/[^\d+]/g, '');
    // If it has a + prefix (international), return as-is cleaned up
    if (raw.trim().startsWith('+')) return raw.trim();
    // US format: 10 digits → (xxx) xxx-xxxx
    const digits = cleaned.replace(/\D/g, '');
    if (digits.length === 10) {
      return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    }
    if (digits.length === 11 && digits[0] === '1') {
      return `(${digits.slice(1,4)}) ${digits.slice(4,7)}-${digits.slice(7)}`;
    }
    return raw.trim(); // fallback: return as typed
  }

  // Auto-format as user types
  document.getElementById('fphone').addEventListener('input', function() {
    const digits = this.value.replace(/\D/g, '');
    if (digits.length <= 3) {
      this.value = digits.length ? `(${digits}` : '';
    } else if (digits.length <= 6) {
      this.value = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    } else if (digits.length <= 10) {
      this.value = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    } else {
      this.value = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6,10)}`;
    }
  });

  // ── DATA ──
  let allMembers = [];
  let currentTab = 'male';

  async function loadMembers() {
    try {
      const res = await fetch('/api/members');
      allMembers = await res.json();
      renderSoberversaries();
      renderStats();
      renderTable();
    } catch(e) {
      document.getElementById('listBody').innerHTML =
        '<tr><td colspan="4" class="empty-cell">Unable to load. Please try again.</td></tr>';
    }
  }

  // ── TAB SWITCHING ──
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
    document.getElementById('gtab-' + tab).classList.add('active');
    const labels = { male: "Men's List", female: "Women's List", nonbinary: "Nonbinary List" };
    document.getElementById('listHeading').textContent = labels[tab];
    renderStats();
    renderTable();
  }

  function filteredMembers() {
    if (currentTab === 'nonbinary') {
      // Nonbinary tab shows ONLY nonbinary entries
      return allMembers.filter(m => m.gender === 'nonbinary');
    }
    return allMembers.filter(m => m.gender === currentTab);
  }

  // ── SOBERVERSARIES ──
  function renderSoberversaries() {
    const today = new Date();
    const thisMonth = today.getMonth();
    const monthName = today.toLocaleString('default', { month: 'long' });
    const sv = [];
    allMembers.forEach(m => {
      if (!m.sobriety_date) return;
      const d = new Date(m.sobriety_date + 'T00:00:00');
      if (d.getMonth() === thisMonth) {
        const years = today.getFullYear() - d.getFullYear();
        if (years > 0) sv.push({ name: m.name, years });
      }
    });
    sv.sort((a,b) => b.years - a.years);

    const block = document.getElementById('soberBlock');
    if (!sv.length) {
      block.innerHTML = `<div class="sober-banner" style="margin-bottom:1rem"><h3>🎂 ${monthName} Soberversaries</h3><p class="no-sv">No soberversaries this month.</p></div>`;
    } else {
      const items = sv.map(s => `
        <div class="sober-item">
          <span class="sober-name">${esc(s.name)}</span>
          <span class="sober-years">${s.years} ${s.years===1?'year':'years'}</span>
        </div>
      `).join('');
      block.innerHTML = `<div class="sober-banner" style="margin-bottom:1rem"><h3>🎂 ${monthName} Soberversaries</h3><div class="sober-list">${items}</div></div>`;
    }
  }

  // ── STATS ──
  function soberStr(members) {
    let days = 0;
    const today = new Date();
    members.forEach(m => {
      if (!m.sobriety_date) return;
      const d = new Date(m.sobriety_date + 'T00:00:00');
      const diff = Math.floor((today - d) / 86400000);
      if (diff > 0) days += diff;
    });
    return `${Math.floor(days/365)}y ${days%365}d`;
  }

  function renderStats() {
    const f = filteredMembers();
    document.getElementById('statCount').textContent = f.length;
    document.getElementById('statSober').textContent = soberStr(f);
    const labels = { male: "Men's", female: "Women's", nonbinary: "Nonbinary" };
    document.getElementById('listSub').textContent = `${f.length} members`;
    document.getElementById('listMeta').textContent =
      `${labels[currentTab]} list · ${soberStr(f)} combined sober time`;
  }

  // ── TABLE ──
  function renderTable() {
    const members = filteredMembers();
    if (!members.length) {
      document.getElementById('listBody').innerHTML =
        '<tr><td colspan="4" class="empty-cell">No members on this list yet.</td></tr>';
      return;
    }
    document.getElementById('listBody').innerHTML = members.map(m => `
      <tr>
        <td class="name-cell">${esc(m.name)}</td>
        <td>${formatPhone(m.phone)}</td>
        <td>${fmtDate(m.sobriety_date)}</td>
        <td>${esc(sponsorStr(m))}</td>
      </tr>
    `).join('');
  }

  function sponsorStr(m) {
    return [m.sponsor_dropdown, m.sponsor_other].filter(Boolean).join(', ') || '—';
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y,mo,day] = d.split('-');
    return `${parseInt(mo)}/${parseInt(day)}/${y.slice(2)}`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── FORM ──
  document.querySelectorAll('input[name="gender"]').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('.gender-opt').forEach(el => el.classList.remove('selected'));
      r.closest('.gender-opt').classList.add('selected');
    });
  });

  async function handleSubmit() {
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('fmsg');
    msg.className = 'msg';

    const gender = document.querySelector('input[name="gender"]:checked')?.value;
    const name = document.getElementById('fname').value.trim();
    const phone = document.getElementById('fphone').value.trim();
    const email = document.getElementById('femail').value.trim();
    const sobriety_date = document.getElementById('fsobriety').value;
    const sponsor_dropdown = document.getElementById('fsponsor_drop').value;
    const sponsor_other = document.getElementById('fsponsor_other').value.trim();

    if (!gender) { showMsg('Please select your identity.', 'error'); return; }
    if (!name)   { showMsg('Please enter your name.', 'error'); return; }
    if (!phone)  { showMsg('Please enter your phone number.', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone, email, sobriety_date, sponsor_dropdown, sponsor_other, gender })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong.');
      showMsg("You've been added. Welcome!", 'success');
      document.getElementById('fname').value = '';
      document.getElementById('fphone').value = '';
      document.getElementById('femail').value = '';
      document.getElementById('fsobriety').value = '';
      document.getElementById('fsponsor_drop').value = '';
      document.getElementById('fsponsor_other').value = '';
      document.querySelectorAll('input[name="gender"]').forEach(el => el.checked = false);
      document.querySelectorAll('.gender-opt').forEach(el => el.classList.remove('selected'));
    } catch(e) {
      showMsg(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Me to the List';
    }
  }

  function showMsg(text, type) {
    const msg = document.getElementById('fmsg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }

  // ── INIT ──
  const month = new Date().toLocaleString('default', { month: 'long' });
  document.getElementById('monthNote').textContent = month + ' soberversaries shown on the list';
</script>
</body>
</html>
