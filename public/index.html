<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUF Phone List</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f2;
      --brown: #5c3d2e;
      --brown-light: #8b6355;
      --gold: #c9973a;
      --gold-light: #e8c07a;
      --text: #2d1f17;
      --text-muted: #7a5c50;
      --border: #ddd0c4;
      --border-focus: #c9973a;
      --success: #4a7c59;
      --error: #8b3a3a;
    }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* Subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-top: 1rem;
    }

    .logo-line {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin: 0 auto 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 20px rgba(92,61,46,0.07);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brown);
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    label .req {
      color: var(--gold);
      margin-left: 2px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    input[type="date"],
    select {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(201,151,58,0.12);
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.85rem;
    }

    .sponsor-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .sponsor-row .select-wrap {
      flex: 1;
    }

    .sponsor-row input[type="text"] {
      flex: 1;
    }

    .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .gender-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gender-opt {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--cream);
      transition: border-color 0.2s, background 0.2s;
    }

    .gender-opt:hover {
      border-color: var(--gold-light);
      background: #fef9f0;
    }

    .gender-opt input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
      cursor: pointer;
    }

    .gender-opt.selected {
      border-color: var(--gold);
      background: #fef9f0;
    }

    .gender-label {
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text);
    }

    .submit-btn {
      width: 100%;
      height: 50px;
      background: var(--brown);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .submit-btn:hover { background: var(--brown-light); }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .msg {
      margin-top: 1rem;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .msg.success {
      background: #edf6f0;
      border: 1px solid #a8d5b5;
      color: var(--success);
      display: block;
    }

    .msg.error {
      background: #fdf0f0;
      border: 1px solid #dba8a8;
      color: var(--error);
      display: block;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--gold);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-line"></div>
      <h1>TUF Phone List</h1>
      <p class="subtitle">Add yourself to the meeting phone list</p>
    </header>

    <div class="card">
      <p class="section-title">Your Information</p>

      <div class="field">
        <label>Identity <span class="req">*</span></label>
        <div class="gender-group" id="genderGroup">
          <label class="gender-opt" id="opt-male">
            <input type="radio" name="gender" value="male" /> <span class="gender-label">Male</span>
          </label>
          <label class="gender-opt" id="opt-female">
            <input type="radio" name="gender" value="female" /> <span class="gender-label">Female</span>
          </label>
          <label class="gender-opt" id="opt-nonbinary">
            <input type="radio" name="gender" value="nonbinary" /> <span class="gender-label">Nonbinary / Other / Prefer not to say</span>
          </label>
        </div>
      </div>

      <hr class="divider" />

      <div class="field">
        <label for="name">Name <span class="req">*</span></label>
        <input type="text" id="name" placeholder="e.g. Greg P." autocomplete="off" />
        <p class="hint">First name + last initial is common</p>
      </div>

      <div class="field">
        <label for="phone">Phone Number <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="503-555-1234" />
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="optional" />
      </div>

      <div class="field">
        <label for="sobriety_date">Sobriety Date</label>
        <input type="date" id="sobriety_date" />
      </div>

      <div class="field">
        <label>Willing to Sponsor?</label>
        <div class="sponsor-row">
          <div class="select-wrap">
            <select id="sponsor_dropdown">
              <option value="">Select...</option>
              <option value="Yes">Yes</option>
              <option value="Ask me">Ask me</option>
              <option value="No">No</option>
              <option value="Not yet">Not yet</option>
              <option value="Sober support">Sober support only</option>
              <option value="Temporarily">Temporarily</option>
              <option value="Other">Other (specify →)</option>
            </select>
          </div>
          <input type="text" id="sponsor_other" placeholder="e.g. locally only" />
        </div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Add Me to the List</button>
      <div class="msg" id="msg"></div>
    </div>

    <footer>
      <a href="/admin.html">Admin</a>
    </footer>
  </div>

  <script>
    // Highlight selected gender option
    document.querySelectorAll('input[name="gender"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.gender-opt').forEach(el => el.classList.remove('selected'));
        radio.closest('.gender-opt').classList.add('selected');
      });
    });

    async function handleSubmit() {
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      msg.className = 'msg';
      msg.textContent = '';

      const gender = document.querySelector('input[name="gender"]:checked')?.value;
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const sobriety_date = document.getElementById('sobriety_date').value;
      const sponsor_dropdown = document.getElementById('sponsor_dropdown').value;
      const sponsor_other = document.getElementById('sponsor_other').value.trim();

      if (!gender) { showMsg('Please select your identity.', 'error'); return; }
      if (!name) { showMsg('Please enter your name.', 'error'); return; }
      if (!phone) { showMsg('Please enter your phone number.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, sobriety_date, sponsor_dropdown, sponsor_other, gender })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong.');
        showMsg('You\'ve been added to the list. Welcome!', 'success');
        document.querySelectorAll('input[type="text"], input[type="tel"], input[type="email"], input[type="date"], select').forEach(el => el.value = '');
        document.querySelectorAll('input[name="gender"]').forEach(el => el.checked = false);
        document.querySelectorAll('.gender-opt').forEach(el => el.classList.remove('selected'));
      } catch (e) {
        showMsg(e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Add Me to the List';
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `msg ${type}`;
    }
  </script>
</body>
</html>
